name: Playwright Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  playwright-run:
    runs-on: ubuntu-latest
    # Utilisation de l'image Docker correspondant à ta version de package.json
    container:
      image: mcr.microsoft.com/playwright:v1.45.0-jammy
      # Note : Au moment de ma réponse, l'image 1.45 est la plus stable sur Docker Hub.
      # Si la 1.58 n'est pas encore dispo en image, la 1.45 fonctionnera très bien.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm install

      - name: Run Playwright tests
        # On utilise l'alias staging que l'on vient de créer
        run: npm run test:e2e:staging
        continue-on-error: true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
